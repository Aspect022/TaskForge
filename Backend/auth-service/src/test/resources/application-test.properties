spring.datasource.url=jdbc:h2:mem:taskforge_auth;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USERS
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

spring.data.redis.host=localhost
spring.data.redis.port=6379

taskforge.jwt.access-token-ttl=15m
taskforge.jwt.refresh-token-ttl=7d
taskforge.jwt.private-key-path=
taskforge.jwt.public-key-path=
