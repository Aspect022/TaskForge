spring.application.name=job-service
server.port=${SERVER_PORT:8082}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taskforge}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:taskforge}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:taskforge}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

taskforge.jobs.payload-max-bytes=${JOB_PAYLOAD_MAX_BYTES:1048576}
taskforge.jobs.default-limit=${JOB_DEFAULT_LIMIT:20}
taskforge.jobs.max-limit=${JOB_MAX_LIMIT:100}
